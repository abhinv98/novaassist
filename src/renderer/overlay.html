<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>NovaAssist Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:transparent;
  overflow:hidden;
  height:100vh;
  font-family:Inter,system-ui,-apple-system,sans-serif;
  color:#fff;
  -webkit-app-region:drag;
  user-select:none;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
#container{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:14px;
  background:rgba(0,0,0,.88);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  animation:fadeIn .2s ease-out;
  padding:20px 24px;
  position:relative;
}
#mic-ring{
  width:56px;height:56px;
  border-radius:50%;
  border:1.5px solid #333;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .2s ease;
  flex-shrink:0;
}
#mic-ring.listening{border-color:#0070f3;animation:pulse 1.5s ease-in-out infinite}
#mic-ring.thinking{border-color:#555}
#mic-ring.done{border-color:#00cc88}
#mic-ring.error{border-color:#ff4444}
#mic-icon{transition:color .2s ease;color:#666}
#mic-ring.listening #mic-icon{color:#0070f3}
#mic-ring.thinking #mic-icon{color:#555}
#mic-ring.done #mic-icon{color:#00cc88}
#mic-ring.error #mic-icon{color:#ff4444}
#spinner{display:none;animation:spin 1s linear infinite;color:#555}
#mic-ring.thinking #mic-svg{display:none}
#mic-ring.thinking #spinner{display:block}
#status{
  font-size:12.5px;font-weight:500;
  letter-spacing:.01em;color:#666;
  transition:color .2s ease;
  text-align:center;
  line-height:1.5;
  max-height:80px;
  overflow:hidden;
  padding:0 4px;
}
#mic-ring.listening~#status{color:#0070f3}
#mic-ring.done~#status{color:#ccc}
#transcript{
  font-family:Menlo,Monaco,Consolas,monospace;
  font-size:10.5px;color:#444;
  text-align:center;
  line-height:1.5;
  max-height:36px;
  overflow:hidden;
  word-break:break-word;
  padding:0 8px;
}
#progress-bar{
  width:80%;height:3px;
  background:#1a1a1a;
  border-radius:2px;
  overflow:hidden;
  display:none;
}
#progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#0070f3,#00cc88);
  border-radius:2px;
  transition:width .3s ease;
}
#step-label{
  font-size:10px;
  color:#444;
  letter-spacing:.02em;
  display:none;
}
#hint{
  position:absolute;
  bottom:10px;
  font-size:10px;
  color:#2a2a2a;
  letter-spacing:.02em;
}
</style>
</head>
<body>
<div id="container">
  <div id="mic-ring" class="listening">
    <svg id="mic-svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" id="mic-icon">
      <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" x2="12" y1="19" y2="22"/>
    </svg>
    <svg id="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
    </svg>
  </div>
  <div id="status">Listening...</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="step-label"></div>
  <div id="transcript"></div>
  <div id="hint">⌘⇧Space to ask again</div>
</div>
<script>
  const ring = document.getElementById('mic-ring');
  const status = document.getElementById('status');
  const transcript = document.getElementById('transcript');
  const progressBar = document.getElementById('progress-bar');
  const progressFill = document.getElementById('progress-fill');
  const stepLabel = document.getElementById('step-label');

  window.novaAssist.onOverlayUpdate((data) => {
    ring.className = data.state || 'listening';
    if (data.status) status.textContent = data.status;
    if (data.transcript !== undefined) transcript.textContent = data.transcript;

    if (data.step && data.totalSteps && data.totalSteps > 1) {
      progressBar.style.display = 'block';
      stepLabel.style.display = 'block';
      const pct = Math.round((data.step / data.totalSteps) * 100);
      progressFill.style.width = pct + '%';
      stepLabel.textContent = 'Step ' + data.step + ' of ' + data.totalSteps;
    } else {
      progressBar.style.display = 'none';
      stepLabel.style.display = 'none';
      progressFill.style.width = '0%';
    }
  });
</script>
</body>
</html>
